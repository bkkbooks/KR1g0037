body:
  text: 五經大義鄭注喪服云凡妻從夫降一等夫合三月則妻宜無服而猶三月者古者大夫不外娶其妻則本國之女也雖後而出婦人歸宗往來故從人服也長子有服謂末去者也逵謂鄭元注喪服不通何者婦人義無二尊故出嫁則降父而服夫何至為人去國乃兼服二君乎若果宜兩服夫經紀應允將謂大夫於君之母妻本有𪗋斬之殊乃仕焉而已則俱在三月蓋其義也杜佑通典卷九十大功殤服七月九月范寧與逵書問馬鄭二義逵答曰夫易者當使用日則廢月可得言易耳鄭以哭日準平生之月而謂之易且無服之殤非唯周親七歲以下也他親長中降而不服故傳曰不滿八歲已下皆為無服之殤也如馬義則以文悉關諸服降之殤若如鄭義諸降之殤當作何哭耶若復哭其生月則緦麻之長殤決不可二百餘日哭鄭必推之於不哭則小功之親以老學之年成童而夭無哭泣之位恐非有情者之所允也通典卷九十一披榛而遊遇穴而處男無定居女無常處虞世南北堂書鈔地部引戴逵雜義
